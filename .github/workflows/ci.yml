# .github/workflows/ci.yml, alright!
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ENV: local
      STRICT_API_KEYS: "false"
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install deps (CI base)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run unit tests
        run: pytest tests/

  deepeval:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements-deepeval.txt

      - name: Install deps (DeepEval only)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-deepeval.txt

      - name: Write GCP service-account key
        run: 'printf ''%s'' "$GCP_SA_KEY" > "$GITHUB_WORKSPACE/gcp-sa.json"'
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Run DeepEval (Vertex Gemini judge)
        env:
          USE_VERTEX: "true"
          LLM_PROVIDER: google
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: us-central1
          CONFIDENT_API_KEY: ${{ secrets.CONFIDENT_API_KEY }}
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
        run: python eval/run_doc_chat_deepeval.py
